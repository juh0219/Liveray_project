{% extends "base.html" %}
{% load static %}

{% block title %}Liverary | 사용자 정보{% endblock %}
{% block search_bar %}{% endblock %}

{% block content %}
<script>
  const USER = {
    name: "{{ user_obj.first_name|default_if_none:''|escapejs }}",
    studentId: "{{ user_obj.username|escapejs }}",
    school: "창녕옥야고등학교"
  };

  const BOOK1 = {
    {% if loan1 %}
    cover: "https://contents.kyobobook.co.kr/sih/fit-in/458x0/pdt/{{ loan1.book.isbn }}.jpg",
    title: "{{ loan1.book.title|escapejs }}",
    author: "{{ loan1.book.author|default_if_none:''|escapejs }}",
    published: "{{ loan1.book.pub_year|default_if_none:''|escapejs }}",
    isbn: "{{ loan1.book.isbn|default_if_none:''|escapejs }}",
    loanDate: "{{ loan1.loaned_at|date:'Y-m-d' }}"
    {% endif %}
  };

  const BOOK2 = {
    {% if loan2 %}
    cover: "https://contents.kyobobook.co.kr/sih/fit-in/458x0/pdt/{{ loan2.book.isbn }}.jpg",
    title: "{{ loan2.book.title|escapejs }}",
    author: "{{ loan2.book.author|default_if_none:''|escapejs }}",
    published: "{{ loan2.book.pub_year|default_if_none:''|escapejs }}",
    isbn: "{{ loan2.book.isbn|default_if_none:''|escapejs }}",
    loanDate: "{{ loan2.loaned_at|date:'Y-m-d' }}"
    {% endif %}
  };
</script>

<style>
  .container { padding: 10px var(--pad) 28px; }
  .user-layout { max-width: 1200px; margin: 0 auto; display: flex; }
  .user-col { padding: 16px 18px 20px; }
  .user-col-1 { flex: 2; border-right: 1px solid var(--border); min-width: 0; }
  .user-col-2 { flex: 5; border-right: 1px solid var(--border); min-width: 0; }
  .user-col-3 { flex: 5; min-width: 0; }

  .section-title { margin: 0 0 12px; font-size: 18px; font-weight: 800; }
  .user-fields { font-size: 15px; display: flex; flex-direction: column; gap: 6px; }
  .user-label { font-weight: 700; }

  /* 대출 슬롯 레이아웃 - 다시 상단 정렬로 복구 */
  .loan-slot {
    display: flex;
    align-items: flex-start;
    gap: 24px;
    width: 100%;
  }

  .cover {
    position: relative;
    width: calc(clamp(160px, 20vw, 260px) * 0.8333);
    aspect-ratio: 8/11;
    border-radius: 20px; overflow: hidden; background: #eee;
    box-shadow: 0 2px 4px rgba(0,0,0,.05);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }

  .fallback-title {
    position: absolute; width: 100%; padding: 15px; text-align: center;
    font-size: 16px; font-weight: 800; color: #555; z-index: 1;
    line-height: 1.4; word-break: keep-all; display: none;
  }

  .cover img { width: 100%; height: 100%; object-fit: cover; display: block; transition: filter .2s ease; position: relative; z-index: 2; }
  .cover::after { content: ""; position: absolute; inset: 0; background: rgba(255,255,255,.55); backdrop-filter: blur(2px); opacity: 0; transition: opacity .2s ease; z-index: 3; }

  /* 오버레이 수정: 버튼을 정중앙에 배치 */
  .cover-overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity .2s ease; pointer-events: auto; z-index: 4;
  }
  .overlay-content {
    width: 100%; padding: 0 10px;
    display: flex; flex-direction: column; align-items: center;
  }
  .overlay-content .meta-line {
    font-size: 15px; text-shadow: 0 1px 2px rgba(0,0,0,.2); color:var(--text); text-align:left !important; color: #111; font-weight: 700; text-align: center;
    line-height: 1.4; margin-bottom: 2px;
  }

  .cover:hover::after, .cover.touch-on::after { opacity: 1; }
  .cover:hover .cover-overlay, .cover.touch-on .cover-overlay { opacity: 1; }
  .cover:hover img, .cover.touch-on img { filter: blur(1.5px); }

  .cover.empty-slot { background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; color: #111; box-shadow: none; }

  .meta { min-width: 0; flex: 1; display: flex; flex-direction: column; text-align: left; }

  .title {
    margin: 0; font-size: 28px; font-weight: 800; word-break: keep-all;
    line-height: 1.3; display: block; text-align: left; height: auto;
  }

  .author {
    margin: 8px 0 0; font-size: 18px; color: #4b5563; font-weight: 500;
    display: block; text-align: left; height: auto;
  }

  .due-text {
    margin-top: 20px; font-size: 20px; font-weight: 700; color: #374151;
    white-space: nowrap; overflow: hidden; text-align: left;
  }
  .due-text.danger, .due-text.overdue { color: #dc2626; }

  /* 책 보기 버튼 - 오버레이 내 중앙 정렬 */
  .view-btn {
    margin-top: 10px; height: 32px; padding: 0 12px;
    border-radius: 10px; border: 1px solid var(--border);
    background: #fff; font-weight: 600; font-size: 14px; cursor: pointer;
  }

  @media(max-width: 850px) {
    .user-layout { flex-direction: column; }
    .user-col { padding: 16px var(--pad) 18px; border-right: none !important; border-bottom: 1px solid var(--border); }
    .loan-slot { flex-direction: column; align-items: center; gap: 14px; }
    .cover { width: min(75vw, 350px); }
    .meta { text-align: center; width: 100%; }
    .title, .author, .due-text { text-align: center; }
    .view-btn { align-self: center; }
  }
</style>

<main class="container">
  <section class="user-layout">
    <div class="user-col user-col-1">
      <h2 class="section-title">사용자 정보</h2>
      <div class="user-fields">
        <div><span class="user-label">• 이름:</span> <span id="userName"></span></div>
        <div><span class="user-label">• 학번:</span> <span id="userStudentId"></span></div>
        <div><span class="user-label">• 학교:</span> <span id="userSchool"></span></div>
      </div>
    </div>

    <div class="user-col user-col-2">
      <h2 class="section-title">대출 슬롯1</h2>
      <div class="loan-slot">
        <div class="cover" id="loan1Cover">
          <div class="fallback-title" id="loan1Fallback"></div>
          <img id="loan1CoverImg" src="" alt="책 표지">
          <div class="cover-overlay">
            <div class="overlay-content">
              <div class="meta-line" id="loan1PubText"></div>
              <div class="meta-line" id="loan1IsbnText"></div>
              {% if loan1 %}<button class="view-btn" type="button" onclick="location.href='{% url 'book_detail' pk=loan1.book.pk %}'">책 보기</button>{% endif %}
            </div>
          </div>
        </div>
        <div class="meta">
          <h1 class="title" id="loan1Title"></h1>
          <div class="author" id="loan1Author"></div>
          <div id="loan1Due" class="due-text"></div>
        </div>
      </div>
    </div>

    <div class="user-col user-col-3">
      <h2 class="section-title">대출 슬롯2</h2>
      <div class="loan-slot">
        <div class="cover" id="loan2Cover">
          <div class="fallback-title" id="loan2Fallback"></div>
          <img id="loan2CoverImg" src="" alt="책 표지">
          <div class="cover-overlay">
            <div class="overlay-content">
              <div class="meta-line" id="loan2PubText"></div>
              <div class="meta-line" id="loan2IsbnText"></div>
              {% if loan2 %}<button class="view-btn" type="button" onclick="location.href='{% url 'book_detail' pk=loan2.book.pk %}'">책 보기</button>{% endif %}
            </div>
          </div>
        </div>
        <div class="meta">
          <h1 class="title" id="loan2Title"></h1>
          <div class="author" id="loan2Author"></div>
          <div id="loan2Due" class="due-text"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<script>
  function fitDueText(el) {
    if (!el) return;
    const maxSize = 20; const minSize = 12;
    let size = maxSize; el.style.fontSize = size + "px";
    let guard = 0;
    while (el.scrollWidth > el.clientWidth && size > minSize && guard < 40) {
      size -= 0.5; el.style.fontSize = size + "px"; guard++;
    }
  }

  function buildDueText(loanDateStr, el) {
    const loanDate = new Date(loanDateStr);
    if (isNaN(loanDate)) return "";
    const today = new Date();
    loanDate.setHours(0, 0, 0, 0); today.setHours(0, 0, 0, 0);
    const diffMs = today.getTime() - loanDate.getTime();
    const passedDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
    const remaining = 14 - passedDays;
    el.classList.remove('danger', 'overdue');
    if (remaining < 0) { el.classList.add('overdue'); return "연체되었습니다."; }
    else { if (remaining < 3) el.classList.add('danger'); return `연체까지 D-${remaining}`; }
  }

  function setupDueEvents(el) {
    const loanDateStr = el.dataset.loanDate;
    el.addEventListener('mouseenter', () => { el.textContent = `대출일: ${loanDateStr}`; fitDueText(el); });
    el.addEventListener('mouseleave', () => { el.textContent = el.dataset.defaultText || ""; fitDueText(el); });
  }

  function renderLoan(slot, bookObj) {
    const cover = document.getElementById(`loan${slot}Cover`);
    const img = document.getElementById(`loan${slot}CoverImg`);
    const fallback = document.getElementById(`loan${slot}Fallback`);
    const pubEl = document.getElementById(`loan${slot}PubText`);
    const isbnEl = document.getElementById(`loan${slot}IsbnText`);
    const titleEl = document.getElementById(`loan${slot}Title`);
    const authorEl = document.getElementById(`loan${slot}Author`);
    const dueEl = document.getElementById(`loan${slot}Due`);

    if (!bookObj || !bookObj.title) {
      cover.classList.add('empty-slot');
      if (img) img.style.display = 'none';
      if (fallback) fallback.style.display = 'none';
      const overlay = cover.querySelector('.cover-overlay');
      if (overlay) overlay.style.display = 'none';
      cover.textContent = "빈 슬롯";
      if (titleEl) titleEl.textContent = "";
      if (authorEl) authorEl.textContent = "";
      if (dueEl) dueEl.style.display = 'none';
      return;
    }

    cover.classList.remove('empty-slot');
    titleEl.textContent = bookObj.title;
    authorEl.textContent = bookObj.author || "";

    const isbnVal = (bookObj.isbn || "").trim();
    const isInvalid = !isbnVal || isbnVal === 'None' || isbnVal === 'Basic';

    if (isInvalid) {
      if (img) img.style.display = 'none';
      if (fallback) { fallback.textContent = bookObj.title; fallback.style.display = 'block'; }
      if (isbnEl) { isbnEl.textContent = ""; isbnEl.style.display = 'none'; }
    } else {
      if (img) { img.style.display = 'block'; img.src = bookObj.cover; }
      if (fallback) fallback.style.display = 'none';
      if (isbnEl) { isbnEl.textContent = `• ISBN: ${isbnVal}`; isbnEl.style.display = 'block'; }
    }

    if (pubEl) {
      if (bookObj.published) { pubEl.textContent = `• 출판년도: ${bookObj.published}년`; pubEl.style.display = 'block'; }
      else { pubEl.textContent = ""; pubEl.style.display = 'none'; }
    }

    if (dueEl && bookObj.loanDate) {
      dueEl.style.display = 'block';
      const dText = buildDueText(bookObj.loanDate, dueEl);
      dueEl.dataset.defaultText = dText;
      dueEl.dataset.loanDate = bookObj.loanDate;
      dueEl.textContent = dText;
      fitDueText(dueEl);
      setupDueEvents(dueEl);
    }
  }

  (function() {
    document.getElementById('userName').textContent = USER.name || "사용자";
    document.getElementById('userStudentId').textContent = USER.studentId || "";
    document.getElementById('userSchool').textContent = USER.school || "";
    renderLoan(1, BOOK1);
    renderLoan(2, BOOK2);
    window.addEventListener('resize', () => {
      fitDueText(document.getElementById('loan1Due'));
      fitDueText(document.getElementById('loan2Due'));
    });
  })();

  (function() {
    const covers = document.querySelectorAll('.cover');
    covers.forEach(c => {
      if (c.classList.contains('empty-slot')) return;
      const on = () => c.classList.add('touch-on');
      const off = () => c.classList.remove('touch-on');
      c.addEventListener('touchstart', on, { passive: true });
      c.addEventListener('touchend', off);
      c.addEventListener('touchcancel', off);
    });
  })();
</script>
{% endblock %}
